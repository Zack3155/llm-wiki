docs_dir: docs
site_name: "LLM Wiki · 知识库"
site_dir: site
exclude_docs: |
  raw/**
  pages/**
  archive/**
  reports/**
  log.md
theme:
  name: material
  language: zh
  palette:
    - scheme: slate
      primary: indigo
      accent: purple
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: purple
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share

plugins:
  - awesome-pages:
      collapse_single_pages: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - tables
  - attr_list
  - toc:
      permalink: true
