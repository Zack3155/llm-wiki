site_name: Personal Wiki
site_description: LLM-maintained personal knowledge base
dev_addr: 127.0.0.1:8300
theme:
  name: material
  palette:
    scheme: slate
    primary: black
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
